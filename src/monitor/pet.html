<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ClawBrid Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* ── 펫 영역 ── */
    .pet-area {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 16px;
      overflow: visible;
    }

    .pet {
      font-size: 42px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: transform 0.3s;
      filter: drop-shadow(0 0 6px var(--pet-glow, transparent));
      animation: petBounce 0.6s ease-in-out infinite alternate;
    }
    .pet:hover { transform: scale(1.3); }
    .pet.walking { animation: petWalk 0.4s ease-in-out infinite alternate; }
    @keyframes petBounce {
      from { transform: translateY(0); }
      to { transform: translateY(-4px); }
    }
    @keyframes petWalk {
      from { transform: translateY(0) rotate(-5deg); }
      to { transform: translateY(-6px) rotate(5deg); }
    }

    .pet-grade-legendary { filter: drop-shadow(0 0 10px #f0b232) drop-shadow(0 0 20px #f0b23266); }
    .pet-grade-epic { filter: drop-shadow(0 0 8px #bc8cff) drop-shadow(0 0 16px #bc8cff66); }
    .pet-grade-rare { filter: drop-shadow(0 0 6px #58a6ff); }
    .pet-grade-uncommon { filter: drop-shadow(0 0 4px #3fb950); }

    /* ── 펫 정보 ── */
    .pet-info {
      background: #161b22;
      border: 1px solid var(--pet-border, #30363d);
      border-radius: 10px;
      padding: 4px 10px;
      font-size: 11px;
      white-space: nowrap;
      display: none;
      margin-bottom: 4px;
    }
    .pet-info.show { display: block; animation: fadeIn 0.3s; }
    .pet-name { font-weight: 600; color: var(--pet-color, #c9d1d9); }
    .pet-grade { font-size: 10px; margin-left: 4px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── 말풍선 ── */
    .pet-bubble {
      background: #1c2333;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 11px;
      color: #c9d1d9;
      line-height: 1.4;
      display: none;
      word-break: keep-all;
      -webkit-app-region: no-drag;
      margin: 0 8px 4px 8px;
      text-align: center;
    }
    .pet-bubble.show { display: block; animation: fadeIn 0.3s; }
    .pet-bubble::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      margin: 4px auto -12px auto;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid #1c2333;
    }

    /* ── 뽑기 버튼 ── */
    .pet-pull-btn {
      padding: 12px 28px;
      border: 2px solid #58a6ff;
      border-radius: 20px;
      background: #161b22;
      color: #58a6ff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: all 0.2s;
      animation: pullBtnGlow 2s ease-in-out infinite;
    }
    .pet-pull-btn:hover {
      background: #58a6ff;
      color: #0f1117;
      transform: scale(1.05);
    }
    @keyframes pullBtnGlow {
      0%,100% { box-shadow: 0 0 8px #58a6ff44; }
      50% { box-shadow: 0 0 20px #58a6ff88; }
    }

    /* ── 뽑기 연출 ── */
    .gacha-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .gacha-egg {
      font-size: 64px;
      animation: eggShake 0.5s ease-in-out 0s 3, eggCrack 0.8s ease-out 1.5s forwards;
    }
    @keyframes eggShake {
      0%,100% { transform: rotate(0); }
      20% { transform: rotate(-15deg); }
      40% { transform: rotate(12deg); }
      60% { transform: rotate(-10deg); }
      80% { transform: rotate(8deg); }
    }
    @keyframes eggCrack {
      0% { transform: scale(1); opacity: 1; }
      30% { transform: scale(1.2); }
      60% { transform: scale(1.4); opacity: 0.8; }
      100% { transform: scale(2); opacity: 0; }
    }
    .gacha-result {
      display: none;
      text-align: center;
      animation: resultReveal 0.8s ease-out;
    }
    .gacha-result.show { display: block; }
    @keyframes resultReveal {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }
    .gacha-pet-emoji { font-size: 48px; }
    .gacha-pet-name { font-size: 14px; font-weight: 700; margin-top: 4px; color: #c9d1d9; }
    .gacha-pet-grade { font-size: 12px; margin-top: 4px; }

    /* 파티클 */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      animation: particleFly 1.5s ease-out forwards;
    }
    @keyframes particleFly {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0.3); }
    }
  </style>
</head>
<body>

<div class="pet-area" id="pet-area">
  <!-- 뽑기 전: 버튼 / 뽑기 후: 펫 표시 -->
</div>

<script src="tauri-bridge.js"></script>
<script>
const area = document.getElementById('pet-area');

// ── 펫 표시 ──
let currentPet = null;

function showPet(pet) {
  currentPet = pet;
  const gradeClass = pet.grade.name.toLowerCase();

  area.innerHTML = `
    <div style="flex:1;"></div>
    <div class="pet-bubble" id="pet-bubble"></div>
    <div class="pet-info" id="pet-info">
      <span class="pet-name" style="color:${pet.grade.color}">${pet.name}</span>
      <span class="pet-grade" style="color:${pet.grade.color}">${pet.grade.stars}</span>
    </div>
    <div class="pet pet-grade-${gradeClass}" id="pet-emoji"
         style="--pet-glow:${pet.grade.color}"
         onclick="onPetClick()"
         onmouseenter="showPetInfo()"
         onmouseleave="hidePetInfo()">
      ${pet.emoji}
    </div>
  `;

  // 걷기 애니메이션
  startWalking();
  // 인사
  setTimeout(() => showBubbleText(getGreeting()), 1000);
  // 주기적 대화
  setInterval(() => {
    if (Math.random() < 0.3) showBubbleText(getIdleChat());
  }, 60000);
}

function showPetInfo() {
  const el = document.getElementById('pet-info');
  if (el) el.classList.add('show');
}
function hidePetInfo() {
  const el = document.getElementById('pet-info');
  if (el) el.classList.remove('show');
}

function onPetClick() {
  showBubbleText(getIdleChat());
  spawnParticles();
}

function showBubbleText(text) {
  const bubble = document.getElementById('pet-bubble');
  if (!bubble) return;
  bubble.textContent = text;
  bubble.classList.add('show');
  setTimeout(() => bubble.classList.remove('show'), 5000);
}

// ── 걷기 ──
function startWalking() {
  const pet = document.getElementById('pet-emoji');
  if (!pet) return;
  setInterval(() => {
    pet.classList.add('walking');
    setTimeout(() => pet.classList.remove('walking'), 2000);
  }, 8000);
}

// ── 대화 생성 ──
function getGreeting() {
  const hour = new Date().getHours();
  const greetings = {
    morning: ['좋은 아침! ☀️', '일어났어? 오늘도 화이팅!', '굿모닝~ 🌅'],
    lunch: ['밥 먹었어? 🍚', '점심시간이다~', '배고파... 🍜'],
    evening: ['오늘 하루 수고했어!', '슬슬 쉬어도 돼~', '저녁이야 🌆'],
    night: ['아직 안 자? 😴', '늦었는데... 건강 챙겨!', '밤늦게까지 고생이다 🌙'],
    default: ['안녕! 반가워~ 👋', '왔어? ㅎㅎ', '오늘도 잘 해보자!'],
  };
  let key = 'default';
  if (hour >= 6 && hour < 11) key = 'morning';
  else if (hour >= 11 && hour < 14) key = 'lunch';
  else if (hour >= 17 && hour < 21) key = 'evening';
  else if (hour >= 22 || hour < 6) key = 'night';
  const list = greetings[key];
  return list[Math.floor(Math.random() * list.length)];
}

function getIdleChat() {
  const chats = [
    '뭐 하고 있어? 🤔', '심심해~', '코딩 잘 되고 있어?',
    '가끔은 스트레칭 해! 💪', '물 마셔! 💧', '오늘 뭐 먹었어?',
    '나 건들지 마... 자는 중... 😴', 'ㅎㅎ 나 귀엽지?',
    '에러 없는 하루 되길! ✨', '커밋 했어? 🤨',
    '여기 좋다~ 따뜻해 🔥', '간식 먹고 싶다...',
    '넌 최고야! 🌟', '오늘도 버그 없는 하루~',
  ];
  return chats[Math.floor(Math.random() * chats.length)];
}

// ── 파티클 ──
function spawnParticles() {
  const emojis = ['✨', '⭐', '💫', '🌟', '💖', '🎵'];
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = `${40 + Math.random() * 40}%`;
    el.style.top = `${50 + Math.random() * 20}%`;
    el.style.fontSize = `${14 + Math.random() * 10}px`;
    el.style.setProperty('--px', `${(Math.random() - 0.5) * 100}px`);
    el.style.setProperty('--py', `${-30 - Math.random() * 80}px`);
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

// ── 뽑기 연출 ──
function showPullButton() {
  area.innerHTML = `<button class="pet-pull-btn" onclick="doPull()">🥚 펫 뽑기</button>`;
}

async function doPull() {
  const pet = bridge.generatePet();
  await bridge.savePet(pet);

  area.innerHTML = `
    <div class="gacha-overlay" id="gacha-overlay">
      <div class="gacha-egg" id="gacha-egg">🥚</div>
      <div class="gacha-result" id="gacha-result">
        <div class="gacha-pet-emoji"></div>
        <div class="gacha-pet-name"></div>
        <div class="gacha-pet-grade"></div>
      </div>
    </div>
  `;

  // 알 깨지고 결과 표시
  setTimeout(() => {
    const egg = document.getElementById('gacha-egg');
    const result = document.getElementById('gacha-result');
    if (egg) egg.style.display = 'none';
    if (result) {
      result.querySelector('.gacha-pet-emoji').textContent = pet.emoji;
      result.querySelector('.gacha-pet-name').textContent = pet.name;
      result.querySelector('.gacha-pet-name').style.color = pet.grade.color;
      result.querySelector('.gacha-pet-grade').textContent = `${pet.grade.name} ${pet.grade.stars}`;
      result.querySelector('.gacha-pet-grade').style.color = pet.grade.color;
      result.classList.add('show');
    }
    spawnParticles();
  }, 2300);

  // 3초 후 펫 표시
  setTimeout(() => showPet(pet), 4000);
}

// ── 초기화 ──
(async () => {
  const saved = await bridge.loadPet();
  if (saved) {
    showPet(saved);
  } else {
    showPullButton();
  }
})();
</script>
</body>
</html>
